<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>早餐點餐 ｜ 躍勇業發組</title>
<style>
  :root{
    --primary:#1B2A4A; --accent:#C9A84C; --bg:#FAF6EE;
    --text:#333333; --border:#E8E0D0; --deepgold:#A07830;
    --cardsel:#FFF3CC;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:"Noto Sans TC","微軟正黑體",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding-bottom:90px;}
  header{background:linear-gradient(135deg,#1B2A4A,#2E4A7A);color:#fff;padding:26px 20px 22px;text-align:center;border-bottom:3px solid var(--accent);}
  header .brand{font-size:13px;letter-spacing:4px;color:var(--accent);margin-bottom:8px;}
  header h1{font-size:24px;font-weight:900;margin-bottom:6px;}
  header p{font-size:14px;opacity:.9;}
  .wrap{max-width:560px;margin:0 auto;padding:18px 16px;}
  .field{margin-bottom:18px;}
  .field label{display:block;font-weight:700;color:var(--primary);margin-bottom:8px;font-size:16px;}
  .field input{width:100%;padding:13px 14px;font-size:16px;border:1.5px solid var(--border);border-radius:10px;background:#fff;}
  .field input:focus{outline:none;border-color:var(--accent);}
  .section-title{font-size:18px;font-weight:900;color:var(--primary);margin:26px 0 4px;display:flex;align-items:center;gap:8px;}
  .section-title .num{background:var(--accent);color:#fff;width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:14px;flex:none;}
  .section-sub{font-size:13px;color:#888;margin-bottom:12px;}
  .options{display:grid;gap:10px;}
  .opt{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:#fff;border:1.5px solid var(--border);border-radius:12px;cursor:pointer;transition:.15s;}
  .opt:active{transform:scale(.99);}
  .opt.sel{background:var(--cardsel);border-color:var(--accent);box-shadow:0 2px 8px rgba(201,168,76,.25);}
  .opt .left{display:flex;align-items:center;gap:12px;}
  .opt .tag{background:var(--primary);color:#fff;font-size:12px;font-weight:700;padding:3px 9px;border-radius:6px;flex:none;}
  .opt.sel .tag{background:var(--deepgold);}
  .opt .name{font-size:16px;font-weight:600;}
  .opt .price{font-size:16px;font-weight:800;color:var(--primary);white-space:nowrap;}
  .barwrap{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid var(--accent);padding:12px 16px;box-shadow:0 -3px 12px rgba(0,0,0,.08);}
  .barwrap .inner{max-width:560px;margin:0 auto;display:flex;align-items:center;gap:12px;}
  .total{flex:1;font-size:15px;}
  .total b{font-size:22px;color:var(--primary);}
  .total .ok{color:#2e7d32;font-weight:700;}
  .total .over{color:#c62828;font-weight:700;}
  .submit{background:var(--primary);color:#fff;border:none;font-size:16px;font-weight:800;padding:14px 22px;border-radius:12px;cursor:pointer;}
  .submit:disabled{background:#bbb;cursor:not-allowed;}
  .done{text-align:center;padding:50px 20px;}
  .done .check{font-size:60px;margin-bottom:14px;}
  .done h2{color:var(--primary);font-size:24px;margin-bottom:10px;}
  .done .summary{background:#fff;border:1.5px solid var(--accent);border-radius:14px;padding:20px;margin:20px auto 0;max-width:360px;text-align:left;}
  .done .summary .row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed var(--border);}
  .done .summary .row:last-child{border:none;}
  footer{text-align:center;padding:18px;font-size:12px;color:#999;}
</style>
</head>
<body>

<!-- ============================================================ -->
<!-- ★★★ 下次只要改這一整個 CONFIG 區塊，其他都不用動 ★★★ -->
<!-- ============================================================ -->
<script>
const CONFIG = {

  // ── 1. 標題區（顯示在最上方）──
  title:    "第七工作月達成 早餐調查",   // 大標題
  subtitle: "主餐＋飲品各選一項",       // 副標題說明

  // ── 2. Apps Script 網址（沿用你現有的，通常不用改）──
  gasUrl: "https://script.google.com/macros/s/AKfycbwE2pX_-_Rv-S7-n4PiXdZ3KWEo4RAO3gVcynZXBD3JY7x_Zg24MojkUY0E01_ps_5Y/exec",

  // ── 3. 是否顯示金額給同仁看（true=顯示 / false=不顯示，後台仍記錄）──
  showPrice: false,

  // ── 4. 預算上限（0 = 不限制；填數字則超過會擋送出）──
  budget: 0,

  // ── 5. 餐點清單（id, 名稱, 價格）想加減幾項都可以 ──
  meals: [
    { id:"A1", name:"卡滋雞腿漢堡",        price:0 },
    { id:"A2", name:"超厚牛起司湯種",      price:0 },
    { id:"A3", name:"中式拼盤",            price:0 },
    { id:"A4", name:"花生厚牛起司可頌",    price:0 },
    { id:"A5", name:"鮮蔬可頌(素食)",      price:0 },
  ],

  // ── 6. 飲料清單（id, 名稱, 價格）──
  drinks: [
    { id:"B1", name:"冰紅茶",     price:0 },
    { id:"B2", name:"冰奶茶",     price:0 },
    { id:"B3", name:"熱紅茶",     price:0 },
    { id:"B4", name:"熱美式咖啡", price:0 },
    { id:"B5", name:"冰美式咖啡", price:0 },
  ],

  // ── 7. 附餐說明（留空字串 "" 就不顯示這行）──
  sideNote: "",

};
// ============================================================
// ★★★ CONFIG 到此結束，以下程式碼不用動 ★★★
// ============================================================
</script>

<header>
  <div class="brand">躍勇業發組</div>
  <h1 id="hTitle"></h1>
  <p id="hSub"></p>
</header>

<div id="formView" class="wrap">
  <div class="field">
    <label>姓名 / 暱稱</label>
    <input id="uname" type="text" placeholder="請輸入您的名字">
  </div>
  <div class="section-title"><span class="num">1</span>選擇餐點</div>
  <div class="section-sub" id="mealSub"></div>
  <div class="options" id="meals"></div>
  <div class="section-title"><span class="num">2</span>選擇飲料</div>
  <div class="section-sub" id="drinkSub"></div>
  <div class="options" id="drinks"></div>
</div>

<div class="barwrap" id="bar">
  <div class="inner">
    <div class="total"><span id="hint">請選擇餐點與飲料</span></div>
    <button class="submit" id="submitBtn" disabled>送出</button>
  </div>
</div>

<div id="doneView" class="done" style="display:none;">
  <div class="check">✅</div>
  <h2>點餐完成！</h2>
  <p>已送出，資料已記錄</p>
  <div class="summary" id="summary"></div>
</div>

<footer>熊誠毅｜誠毅傳承 · 躍勇業發組</footer>

<script>
const C=CONFIG;
let selMeal=null, selDrink=null;

// 套用標題
document.getElementById("hTitle").textContent=C.title;
document.getElementById("hSub").textContent=C.subtitle+(C.sideNote?(" ｜ 均附"+C.sideNote.replace(/\(.*\)/,"")):"");
document.title=C.title+" ｜ 躍勇業發組";
document.getElementById("mealSub").textContent=chooseText(C.meals.length);
document.getElementById("drinkSub").textContent=chooseText(C.drinks.length)+(C.sideNote?" ｜ 每份主餐均附"+C.sideNote.replace(/\(.*\)/,""):"");

function chooseText(n){
  const cn=["零","一","二","三","四","五","六","七","八","九","十"];
  return (n<=10?cn[n]:n)+"選一";
}

function render(list,el,type){
  list.forEach(item=>{
    const d=document.createElement("div");
    d.className="opt"; d.dataset.id=item.id;
    const priceHtml = C.showPrice ? `<span class="price">${item.price} 元</span>` : "";
    d.innerHTML=`<div class="left"><span class="tag">${item.id}</span><span class="name">${item.name}</span></div>${priceHtml}`;
    d.onclick=()=>{
      el.querySelectorAll(".opt").forEach(o=>o.classList.remove("sel"));
      d.classList.add("sel");
      if(type==="meal") selMeal=item; else selDrink=item;
      update();
    };
    el.appendChild(d);
  });
}
render(C.meals,document.getElementById("meals"),"meal");
render(C.drinks,document.getElementById("drinks"),"drink");

function update(){
  const btn=document.getElementById("submitBtn");
  const hint=document.getElementById("hint");
  const name=document.getElementById("uname").value.trim();
  const t=(selMeal?selMeal.price:0)+(selDrink?selDrink.price:0);
  const over = C.budget>0 && t>C.budget;
  const ready = selMeal && selDrink && name && !over;

  if(over){
    hint.innerHTML='<span class="over">超出預算 '+(t-C.budget)+' 元</span>';
  }else if(selMeal&&selDrink&&name){
    hint.innerHTML = C.showPrice
      ? '<span class="ok">合計 '+t+' 元，可送出 ✓</span>'
      : '<span class="ok">✓ 已選好，可送出</span>';
  }else{
    hint.textContent='請填名字並選擇餐點與飲料';
  }
  btn.disabled=!ready;
}
document.getElementById("uname").addEventListener("input",update);

document.getElementById("submitBtn").onclick=async()=>{
  const btn=document.getElementById("submitBtn");
  const name=document.getElementById("uname").value.trim();
  const t=selMeal.price+selDrink.price;
  const payload={
    name, mealId:selMeal.id, mealName:selMeal.name, mealPrice:selMeal.price,
    drinkId:selDrink.id, drinkName:selDrink.name, drinkPrice:selDrink.price,
    side:C.sideNote||"", total:t,
    time:new Date().toLocaleString("zh-TW",{hour12:false})
  };
  btn.disabled=true; btn.textContent="送出中…";
  try{
    await fetch(C.gasUrl,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)});
  }catch(e){
    alert("送出可能未成功，請確認網路後重試，或截圖回傳群組。");
    btn.disabled=false; btn.textContent="送出"; return;
  }
  let rows=
    `<div class="row"><span>姓名</span><span>${name}</span></div>`+
    `<div class="row"><span>餐點</span><span>${selMeal.name}</span></div>`+
    `<div class="row"><span>飲料</span><span>${selDrink.name}</span></div>`;
  if(C.sideNote) rows+=`<div class="row"><span>附餐</span><span>${C.sideNote}</span></div>`;
  if(C.showPrice) rows+=`<div class="row"><span>合計</span><span>${t} 元</span></div>`;
  document.getElementById("summary").innerHTML=rows;
  document.getElementById("formView").style.display="none";
  document.getElementById("bar").style.display="none";
  document.getElementById("doneView").style.display="block";
  window.scrollTo(0,0);
};
</script>
</body>
</html>
